<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff4f9f" />
    <title>ギャルロボ準備サポート</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="ギャルロボ準備サポート">
      <header class="app-header">
        <div>
          <p class="eyebrow">Gal Robo</p>
          <h1>準備、いっしょにやろ。</h1>
        </div>
        <span class="status-pill" id="statusPill">待機中</span>
      </header>

      <section class="robot-card" aria-label="ギャルロボ">
        <div class="robot-stage">
          <img id="companionImage" src="assets/gyaru-robot.png" alt="ギャル系AIロボット" />
        </div>
        <div class="talk-box" aria-live="polite">
          <p id="talkText">ねえねえ、今日なにから始める？うちが横で応援するで。</p>
        </div>
        <div class="quick-actions" aria-label="声かけ">
          <button type="button" data-event="before">予定前</button>
          <button type="button" data-event="drift">脱線した</button>
          <button type="button" data-event="start">始めた</button>
          <button type="button" data-event="race">5分だけ</button>
          <button type="button" data-event="go">出発前</button>
        </div>
      </section>

      <section class="tool-card plan-card" aria-label="予定">
        <div class="section-heading">
          <p class="eyebrow">Today</p>
          <h2>今日の予定</h2>
        </div>
        <label>
          やること
          <input id="taskInput" type="text" value="外出の準備" />
        </label>
        <label>
          出発・開始時間
          <input id="timeInput" type="time" />
        </label>
        <div class="countdown-box">
          <span>残り</span>
          <strong id="countdownText">時間を入れてね</strong>
        </div>
      </section>

      <section class="tool-card" aria-label="気分">
        <div class="section-heading">
          <p class="eyebrow">Mood</p>
          <h2>今の気分</h2>
        </div>
        <div class="mood-grid" id="moodGrid">
          <button type="button" class="active" data-mood="bright">元気</button>
          <button type="button" data-mood="sleepy">眠い</button>
          <button type="button" data-mood="panic">焦り</button>
          <button type="button" data-mood="low">しんどい</button>
          <button type="button" data-mood="oshi">推し</button>
        </div>
      </section>

      <section class="tool-card buddy-card" aria-label="相棒">
        <div class="section-heading">
          <p class="eyebrow">Buddy</p>
          <h2>相棒チェンジ</h2>
        </div>
        <label>
          呼び名
          <input id="buddyName" type="text" value="ギャルロボ" />
        </label>
        <label class="file-picker">
          <span>写真を選ぶ</span>
          <input id="photoInput" type="file" accept="image/*" />
        </label>
        <button type="button" class="ghost-button" id="resetPhoto">ロボに戻す</button>
      </section>

      <section class="tool-card music-card" aria-label="音楽メモ">
        <div class="section-heading">
          <p class="eyebrow">Music</p>
          <h2>気分上げメモ</h2>
        </div>
        <div class="add-row">
          <input id="musicInput" type="text" placeholder="好きな曲・推しワード" />
          <button type="button" id="addMusic">追加</button>
        </div>
        <div class="music-suggestion">
          <span>おすすめ</span>
          <strong id="musicPick">平成ギャルっぽい元気曲</strong>
        </div>
        <ul id="musicList"></ul>
      </section>

      <section class="tool-card timer-card" aria-label="5分タイマー">
        <div class="section-heading">
          <p class="eyebrow">Sprint</p>
          <h2>5分だけ勝負</h2>
        </div>
        <div class="timer-face" id="timerFace">05:00</div>
        <div class="timer-actions">
          <button type="button" id="startTimer">開始</button>
          <button type="button" class="ghost-button" id="resetTimer">リセット</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
